openapi: '3.0.0'
servers:
  - url: /api/v1/auth/register
info:
  title: Book Store Registration API
  version: 1.0.0

paths:
  /api/v1/users/register:
    post:
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Ошибка валидации данных (клиентская ошибка)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт данных - логин занят (клиентская ошибка)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера (серверная ошибка)
components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - username
        - password
        - captchaToken
      properties:
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
        password:
          type: string
          description: Строгий пароль (мин. 8 символов, 1 цифра, 1 заглавная, 1 строчная, 1 спецсимвол)
        captchaToken:
          type: string
          description: Токен reCAPTCHA
    
    RegisterResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: string